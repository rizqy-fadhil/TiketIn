
services:
  backend:
    build:
      context: ./tiketin-backend
    ports:
      - "3001:3001"
    env_file:
      - ./tiketin-backend/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - tiketin-network

  frontend:
    build:
      context: ./tiketin-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - backend
    networks:
      - tiketin-network

  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - tiketin-network
    volumes:
      - tiketin-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tiketin_db"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  tiketin-network:
    driver: bridge

volumes:
  tiketin-db-data: